name: portal

services:
  portal-service:
    container_name: portal-service

    build:
      context: ./services/portal-service
      dockerfile: docker/Dockerfile.dev

    working_dir: /var/www/html

    volumes:
      - ./services/portal-service:/var/www/html

    networks:
      - portal-network

  mysql:
    image: mysql:8.4

    container_name: portal-mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: portal
      MYSQL_USER: portal
      MYSQL_PASSWORD: portal
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - portal-network

  nginx:
    image: nginx:stable-alpine

    container_name: portal-nginx

    depends_on:
      - portal-service

    ports:
      - "80:80"

    volumes:
      - ./services/portal-service:/var/www/html
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf

    networks:
      - portal-network

volumes:
  mysql-data:

networks:
  portal-network:
    driver: bridge